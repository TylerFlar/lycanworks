    <meta property="og:url" content="https://lycanworks.com/">

    <link rel="icon" href="img/logo.png">
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
        {
            "imports": {

        }

<body>
    <main>
        <section id="hero" class="hero-section">
            <div class="container">
                <img src="img/logo.png" alt="Lycanworks logo" class="logo">

                <a href="#contact" class="primary-button">Get in Touch</a>

        <section id="maintenance" class="page-section">
            <div class="container">
                <h2>Hi there!</h2>

                <p>In the meantime here is a yeen you can spin!</p>
                <div class="model-stage" data-model-stage role="img" aria-label="Spinning 3D character model"></div>
                <p class="model-credit">I don't know who made this model, if someone knows please tell me...</p>
            </div>
        </section>

        <section id="contact" class="page-section page-section--alt">
            <div class="container">
                <h2>Contact</h2>
                <div class="contact-grid">
                    <a href="mailto:tulikkovulpus@gmail.com" class="contact-card">
                        <span class="contact-label">Email</span>
                        <span class="contact-value">tulikkovulpus@gmail.com</span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy;
                <script>document.write(new Date().getFullYear())</script> Lycanworks
            </p>
        </div>
    </footer>
    <script type="module" src="scripts/model-preview.js"></script>
